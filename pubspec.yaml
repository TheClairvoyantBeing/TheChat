name: the_chat
description: A local-first, privacy-focused chatbot powered by Google Gemini.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  provider: ^6.1.1
  google_generative_ai: ^0.4.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.19

  flutter_animate: ^4.5.0 # For smooth animations

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1 # Need build_runner too
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
